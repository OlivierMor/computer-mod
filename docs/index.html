<script>
(function(){
  "use strict";
  var KW = ("and break do else elseif end false for function if in local nil not or repeat return then true until while").split(" ");
  var API = ("print emit channel channels sleep getLocation disk pairs ipairs tostring tonumber type pcall xpcall error assert math string table os select setmetatable next").split(" ");
  var kwSet={}, apiSet={};
  KW.forEach(function(w){kwSet[w]=1;}); API.forEach(function(w){apiSet[w]=1;});

  function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  // Lua syntax highlighter (returns HTML; does its own escaping)
  function highlight(code){
    var re=/(--\[\[[\s\S]*?\]\]|--[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(\b\d+\.?\d*\b)|([A-Za-z_]\w*)/g;
    var out="",last=0,m;
    while((m=re.exec(code))){
      out+=esc(code.slice(last,m.index));
      if(m[1]) out+='<span class="c">'+esc(m[1])+'</span>';
      else if(m[2]) out+='<span class="s">'+esc(m[2])+'</span>';
      else if(m[3]) out+='<span class="n">'+esc(m[3])+'</span>';
      else { var w=m[4];
        if(kwSet[w]) out+='<span class="k">'+w+'</span>';
        else if(apiSet[w]) out+='<span class="a">'+w+'</span>';
        else out+=esc(w);
      }
      last=re.lastIndex;
    }
    out+=esc(code.slice(last));
    return out;
  }

  function slug(s){return s.toLowerCase().replace(/&/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}

  var CALLOUT_TITLES={try:"Try it",why:"Why it works this way",note:"Note",tip:"Tip",warning:"Warning"};
  function calloutTitle(t){ return CALLOUT_TITLES[t] || (t.charAt(0).toUpperCase()+t.slice(1)); }

  // ---- inline markdown ----
  function inline(s){
    s=esc(s);
    s=s.replace(/`([^`]+)`/g,function(_,c){return "<code>"+c+"</code>";});
    s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,t,u){
      if(u.charAt(0)==="#") return '<a href="'+u+'" data-nav="'+u.slice(1)+'">'+t+'</a>';
      return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';
    });
    return s;
  }

  // ---- block markdown -> html (one page body) ----
  function renderBody(lines){
    var html="",i=0;
    function flushPara(buf){ if(buf.length){ html+="<p>"+inline(buf.join(" "))+"</p>"; } }
    while(i<lines.length){
      var line=lines[i];

      // fenced code
      var f=line.match(/^```(\w*)\s*$/);
      if(f){
        var lang=f[1], code=[]; i++;
        while(i<lines.length && !/^```\s*$/.test(lines[i])){ code.push(lines[i]); i++; }
        i++; // skip closing fence
        var body=code.join("\n");
        html+='<pre><code'+(lang?' class="'+lang+'"':'')+'>'+(lang==="lua"?highlight(body):esc(body))+'</code></pre>';
        continue;
      }
      // headings (## and ###/####); single # is a page boundary handled outside
      var h=line.match(/^(#{2,4})\s+(.*)$/);
      if(h){ var lvl=h[1].length; html+="<h"+lvl+' id="'+slug(h[2])+'">'+inline(h[2])+"</h"+lvl+">"; i++; continue; }
      // hr
      if(/^---\s*$/.test(line)){ html+="<hr>"; i++; continue; }
      // table
      if(/^\|.*\|\s*$/.test(line) && i+1<lines.length && /^\|[\s:|-]+\|\s*$/.test(lines[i+1])){
        var head=splitRow(line);
        i+=2; var rows=[];
        while(i<lines.length && /^\|.*\|\s*$/.test(lines[i])){ rows.push(splitRow(lines[i])); i++; }
        html+="<table><thead><tr>"+head.map(function(c){return "<th>"+inline(c)+"</th>";}).join("")+"</tr></thead><tbody>";
        rows.forEach(function(r){ html+="<tr>"+r.map(function(c){return "<td>"+inline(c)+"</td>";}).join("")+"</tr>"; });
        html+="</tbody></table>";
        continue;
      }
      // blockquote / callout
      if(/^>\s?/.test(line)){
        var q=[];
        while(i<lines.length && /^>\s?/.test(lines[i])){ q.push(lines[i].replace(/^>\s?/,"")); i++; }
        var mm=q.length?q[0].match(/^\[!(\w+)\]\s*(.*)$/):null;
        if(mm){
          var type=mm[1].toLowerCase(), title=mm[2]||calloutTitle(type);
          q.shift();
          html+='<div class="callout '+type+'"><div class="ct">'+esc(title)+'</div>'+renderBody(q)+'</div>';
        } else {
          html+="<blockquote>"+renderBody(q)+"</blockquote>";
        }
        continue;
      }
      // unordered list
      if(/^[-*]\s+/.test(line)){
        var items=[];
        while(i<lines.length && /^[-*]\s+/.test(lines[i])){ items.push(lines[i].replace(/^[-*]\s+/,"")); i++; }
        html+="<ul>"+items.map(function(t){return "<li>"+inline(t)+"</li>";}).join("")+"</ul>";
        continue;
      }
      // ordered list
      if(/^\d+\.\s+/.test(line)){
        var oitems=[];
        while(i<lines.length && /^\d+\.\s+/.test(lines[i])){ oitems.push(lines[i].replace(/^\d+\.\s+/,"")); i++; }
        html+="<ol>"+oitems.map(function(t){return "<li>"+inline(t)+"</li>";}).join("")+"</ol>";
        continue;
      }
      // blank
      if(/^\s*$/.test(line)){ i++; continue; }
      // paragraph (gather until blank or block starter)
      var buf=[];
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,4})\s/.test(lines[i])
            && !/^```/.test(lines[i]) && !/^[-*]\s+/.test(lines[i]) && !/^\d+\.\s+/.test(lines[i])
            && !/^>\s?/.test(lines[i]) && !/^---\s*$/.test(lines[i])
            && !(/^\|.*\|\s*$/.test(lines[i]) && i+1<lines.length && /^\|[\s:|-]+\|\s*$/.test(lines[i+1]))){
        buf.push(lines[i]); i++;
      }
      flushPara(buf);
    }
    return html;
  }
  function splitRow(line){
    return line.replace(/^\|/,"").replace(/\|\s*$/,"").split("|").map(function(c){return c.trim();});
  }

  // ---- split markdown into pages by H1 ----
  var raw=document.getElementById("docs").textContent.replace(/^\n/,"");
  var allLines=raw.split("\n");
  var pages=[], cur=null;
  allLines.forEach(function(l){
    var m=l.match(/^#\s+(.*)$/);
    if(m){ cur={title:m[1], id:slug(m[1]), lines:[]}; pages.push(cur); }
    else if(cur){ cur.lines.push(l); }
  });

  // groups for the sidebar
  var GROUPS=[
    {name:"Introduction", titles:["Computer Mod","How It Works","Getting Started","Coding with AI"]},
    {name:"Blocks & Items", titles:["The Computer","The Sensor","The Receiver","The Controller"]},
    {name:"Programming", titles:["Lua Basics","API Reference","Channels","Reading Any Mod or Addon"]},
    {name:"Cookbook", titles:["Patterns and Recipes","Worked Examples"]},
    {name:"Reference", titles:["Troubleshooting and FAQ","Glossary","Cheat Sheet"]}
  ];

  var byTitle={}; pages.forEach(function(p){byTitle[p.title]=p;});

  // render pages
  var main=document.getElementById("main");
  pages.forEach(function(p){
    var sec=document.createElement("section");
    sec.className="page"; sec.id=p.id;
    sec.innerHTML="<h1>"+inline(p.title)+"</h1>"+renderBody(p.lines)+
      '<div class="pagefoot"><button class="btn" data-copypage="'+p.id+'">Copy this page</button>'+
      '<span>Computer Mod Documentation</span></div>';
    main.appendChild(sec);
  });

  // build sidebar
  var nav=document.getElementById("nav");
  GROUPS.forEach(function(g){
    var has=g.titles.filter(function(t){return byTitle[t];});
    if(!has.length) return;
    var gh=document.createElement("div"); gh.className="group"; gh.textContent=g.name; nav.appendChild(gh);
    has.forEach(function(t){
      var p=byTitle[t];
      var a=document.createElement("a");
      a.className="item"; a.href="#"+p.id; a.dataset.nav=p.id;
      a.textContent=t;
      nav.appendChild(a);
    });
  });

  // navigation
  function show(id){
    var page=document.getElementById(id);
    if(!page){ id=pages[0].id; page=document.getElementById(id); }
    document.querySelectorAll(".page").forEach(function(s){s.classList.toggle("active",s.id===id);});
    document.querySelectorAll("nav a.item").forEach(function(a){a.classList.toggle("active",a.dataset.nav===id);});
    window.scrollTo(0,0);
    document.getElementById("nav").classList.remove("open");
  }
  function go(id){ if(location.hash.slice(1)===id) show(id); else location.hash=id; }

  document.addEventListener("click",function(e){
    var a=e.target.closest("[data-nav]");
    if(a){ e.preventDefault(); go(a.dataset.nav); return; }
    var cp=e.target.closest("[data-copypage]");
    if(cp){ var pg=pages.filter(function(p){return p.id===cp.dataset.copypage;})[0];
      if(pg) copyText("# "+pg.title+"\n"+pg.lines.join("\n"), "Page copied as Markdown"); }
  });
  window.addEventListener("hashchange",function(){ show(location.hash.slice(1)); });

  // search filter
  document.getElementById("search").addEventListener("input",function(e){
    var q=e.target.value.toLowerCase();
    document.querySelectorAll("nav a.item").forEach(function(a){
      a.style.display = a.textContent.toLowerCase().indexOf(q)>=0 ? "" : "none";
    });
    document.querySelectorAll("nav .group").forEach(function(g){ g.style.display = q?"none":""; });
  });

  // copy helpers
  function copyText(text,msg){
    function done(){ toast(msg||"Copied!"); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done,function(){ fallback(text); done(); });
    } else { fallback(text); done(); }
  }
  function fallback(text){
    var ta=document.createElement("textarea"); ta.value=text;
    ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta);
    ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta);
  }
  document.getElementById("copyAll").addEventListener("click",function(){
    copyText(raw.replace(/\s+$/,"")+"\n","All docs copied as Markdown. Paste into your LLM.");
  });

  var toastEl=document.getElementById("toast"), toastT;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove("show");},2200); }

  document.getElementById("menuBtn").addEventListener("click",function(){
    document.getElementById("nav").classList.toggle("open");
  });

  // initial page
  show(location.hash.slice(1)||pages[0].id);
})();
</script>
</body>
</html>
